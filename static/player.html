<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveBox Player</title>
  <link rel="stylesheet" href="/static/style.css?v=5" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 14c2.5-1 4.5-4 7-4s4.5 3 7 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 10c2.5-1 4.5-4 7-4s4.5 3 7 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
          </svg>
        </span>
        <div>
          <h1>WaveBox</h1>
        </div>
      </div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search tracks or artists" autocomplete="off" />
      </div>
      <div class="top-actions">
        <span id="user-pill" class="user-pill"></span>
        <a class="open-player-link" href="/">Back to library</a>
        <button id="btn-logout" class="open-player-link" type="button">Log out</button>
      </div>
    </header>

    <main class="layout">
      <section class="now-panel" aria-live="polite">
        <div id="artwork" class="artwork artwork-idle">
          <img id="artwork-img" class="artwork-img" alt="Album cover" />
          <div class="artwork-inner">
            <span class="artwork-note" aria-hidden="true">♪</span>
          </div>
        </div>
        <div class="now-meta">
          <p class="now-label">Now playing</p>
          <h2 id="now-title" class="now-title">Nothing playing</h2>
          <p id="now-artist" class="now-artist">Pick a track from the library</p>
          <span id="now-genre" class="now-genre">—</span>
        </div>
      </section>

      <section class="library-panel">
        <div class="library-head">
          <h2>Library</h2>
          <p id="track-count" class="track-count">Loading…</p>
        </div>

        <div id="genre-filters" class="genre-filters" role="tablist" aria-label="Filter by genre"></div>

        <ul id="tracks" class="track-list"></ul>
      </section>
    </main>

    <footer class="player-bar">
      <div class="player-track">
        <img id="mini-art" class="mini-art" alt="" />
        <div class="player-track-text">
          <p id="bar-title" class="bar-title">—</p>
          <p id="bar-artist" class="bar-artist">—</p>
        </div>
      </div>

      <div class="player-controls">
        <button id="btn-prev" class="icon-btn" type="button" title="Previous" aria-label="Previous track">⏮</button>
        <button id="btn-play" class="icon-btn play-btn" type="button" title="Play" aria-label="Play">▶</button>
        <button id="btn-next" class="icon-btn" type="button" title="Next" aria-label="Next track">⏭</button>
      </div>

      <div class="player-progress">
        <span id="time-current" class="time">0:00</span>
        <input id="seek" type="range" min="0" max="100" value="0" aria-label="Seek" />
        <span id="time-total" class="time">0:00</span>
      </div>

      <audio id="player" preload="metadata"></audio>
    </footer>
  </div>

  <script src="/static/auth.js?v=5"></script>
  <script src="/static/app.js?v=5"></script>
</body>
</html>

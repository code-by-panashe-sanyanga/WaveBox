<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveBox Library</title>
  <link rel="stylesheet" href="/static/style.css?v=6" />
</head>
<body>
  <div class="library-app">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 14c2.5-1 4.5-4 7-4s4.5 3 7 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 10c2.5-1 4.5-4 7-4s4.5 3 7 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
          </svg>
        </span>
        <h1>WaveBox</h1>
      </div>
      <div class="top-actions">
        <span id="user-pill" class="user-pill"></span>
        <a class="open-player-link" href="/player">Open player</a>
        <button id="btn-logout" class="open-player-link" type="button">Log out</button>
      </div>
    </header>

    <main class="library-home">
      <section class="hero-card">
        <p class="hero-kicker">Library</p>
        <h2>Pick an album vibe first</h2>
      </section>

      <section>
        <div class="library-head">
          <h3>Albums</h3>
          <p id="album-count" class="track-count">Loading...</p>
        </div>
        <div id="album-grid" class="album-grid"></div>
      </section>
    </main>
  </div>

  <script src="/static/auth.js?v=5"></script>
  <script src="/static/library.js?v=6"></script>
</body>
</html>
